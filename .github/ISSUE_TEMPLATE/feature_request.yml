---
name: Feature request
description: Suggest a public feature for the exporter
title: "Feature: "
labels: ["type:feature", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please keep requests aligned with the project privacy model: local-first, no analytics, no tracking, no hidden upload.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Explain the user problem, not just the implementation idea.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the exporter do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: privacy
    attributes:
      label: Does this require sending conversation data outside the browser?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true
